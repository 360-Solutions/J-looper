<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>J-LOOPER v0.001</title>
<style>
    /* Global Reset & Typography */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none; /* Prevents text selection on long presses */
        -webkit-user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background-color: #222;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        height: 100vh;
        overflow: hidden; /* Prevents bounce scroll on iOS */
    }

    /* Pedal Chassis */
    #pedal-chassis {
        width: 100%;
        max-width: 420px; /* Fits iPhone 11 Pro Max nicely */
        height: 100vh;
        background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
        border-left: 8px solid #bbb;
        border-right: 8px solid #999;
        border-radius: 12px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 15px 30px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
        position: relative;
    }

    /* Fake Cables */
    .cable {
        position: absolute;
        top: 20px;
        width: 15px;
        height: 40px;
        background: #333;
        border-radius: 4px;
    }
    .cable.left { left: -15px; border-radius: 4px 0 0 4px; box-shadow: inset 0 5px 5px #111; }
    .cable.right { right: -15px; border-radius: 0 4px 4px 0; box-shadow: inset 0 5px 5px #111; }

    /* Top Section */
    #header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 2px solid rgba(0,0,0,0.1);
    }

    #title-area {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
    }

    #title { font-size: 16px; font-weight: 900; color: #000; letter-spacing: 1px;}
    #subtitle { font-size: 10px; color: #333; font-weight: 600;}

    /* LEDs */
    .led {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background-color: #555;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        border: 1px solid rgba(0,0,0,0.8);
        transition: background-color 0.05s;
    }
    .led.flash { background-color: #ff3333; box-shadow: 0 0 8px #ff3333, inset 0 1px 2px rgba(255,255,255,0.4); }
    .led.dim-red { background-color: #8b0000; box-shadow: 0 0 4px #8b0000; }
    .led.bright-red { background-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
    .led.green { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; }

    /* Global Controls */
    #global-controls {
        display: flex;
        justify-content: space-around;
        padding: 8px 4px;
        background: rgba(0,0,0,0.05);
        border-bottom: 2px solid rgba(0,0,0,0.1);
    }

    .btn {
        padding: 6px 4px;
        font-size: 11px;
        font-weight: bold;
        border-radius: 4px;
        border: 1px solid #000;
        text-align: center;
        flex: 1;
        margin: 0 2px;
        touch-action: manipulation;
    }
    .btn:active { transform: translateY(1px); }

    .btn-start { background: #4caf50; color: white; }
    .btn-start.active { background: #f44336; }
    .btn-rubber { background: #222; color: #fff; box-shadow: inset 0 2px 4px rgba(255,255,255,0.2); }
    .btn-bt { background: #2196F3; color: #000; }
    .btn-bt.active { background: #0b5b9e; color: #fff; box-shadow: 0 0 8px #2196F3; }

    /* Sliders container (hidden by default) */
    .slider-container { display: none; padding: 4px 12px; background: #eee; font-size: 11px; }
    .slider-container.active { display: flex; align-items: center; justify-content: space-between; }
    input[type=range] { flex: 1; margin: 0 8px; }

    /* Track Lanes */
    #tracks {
        display: flex;
        flex-direction: column;
        flex: 1;
        padding: 4px 0;
        overflow-y: auto;
    }

    .track {
        display: flex;
        flex-direction: column;
        border-bottom: 2px solid #ccc;
        padding: 6px 8px;
    }

    .track-controls {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
    }

    .track-btn {
        background: #ddd;
        border: 1px solid #888;
        border-radius: 3px;
        font-size: 10px;
        padding: 4px;
        color: #000;
        flex: 1;
        margin: 0 2px;
        touch-action: manipulation;
    }

    /* Node Grid */
    .node-grid {
        display: grid;
        grid-template-columns: repeat(16, 1fr);
        gap: 2px;
        margin-bottom: 8px;
        background: #bbb;
        padding: 2px;
        border-radius: 2px;
    }
    .node {
        height: 12px;
        background: #888;
        border-radius: 1px;
    }
    .node.beat { background: #a0a0a0; } /* Quarter notes slightly lighter */
    .node.active { background: #fff; box-shadow: 0 0 4px #fff; }

    /* Stomp Pedal */
    .stomp-area {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding-left: 10px;
    }

    .stomp-pedal {
        width: 80px;
        height: 35px;
        background: linear-gradient(to bottom, #f0f0f0, #a0a0a0);
        border: 2px solid #555;
        border-radius: 4px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3), inset 0 2px 2px rgba(255,255,255,0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        touch-action: manipulation;
    }
    .stomp-pedal:active {
        transform: translateY(2px);
        box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.4);
    }
    .stomp-led { margin-left: 20px; }

</style>
</head>
<body>

<div id="pedal-chassis">
    <div class="cable left"></div>
    <div class="cable right"></div>

    <div id="header">
        <div id="title-area">
            <div id="title">J-LOOPER v 0.001</div>
            <div id="subtitle">Created by Jeremiah Keller</div>
        </div>
        <div id="global-led" class="led"></div>
    </div>

    <div id="global-controls">
        <div id="btn-start" class="btn btn-start">START</div>
        <div id="btn-tempo" class="btn btn-rubber">TEMPO</div>
        <div id="btn-click" class="btn btn-rubber">CLICK</div>
        <div id="btn-mute" class="btn btn-rubber">MUTE</div>
        <div id="btn-bt" class="btn btn-bt">BT</div>
    </div>

    <div id="slider-tempo" class="slider-container">
        <label>Tempo:</label>
        <input type="range" id="tempo-range" min="40" max="200" value="94">
        <span id="tempo-val">94</span>
    </div>

    <div id="slider-click" class="slider-container">
        <label>Click Vol:</label>
        <input type="range" id="click-vol-range" min="0" max="300" value="80">
        <span id="click-vol-val">80%</span>
    </div>

    <div id="tracks">
        </div>
</div>

<script>
    // System Constants & State
    const TRACK_COUNT = 4;
    let audioCtx = null;
    let isPlaying = false;
    let isBTReady = false;
    let globalTempo = 94;
    let clickVolume = 0.8;
    let clickMuted = false;
    
    let nextNoteTime = 0.0;
    let current16thNote = 0;
    let lookahead = 25.0; // ms
    let scheduleAheadTime = 0.1; // s
    let timerID = null;

    let micStream = null;
    let micNode = null;
    
    // Future drum/click samples go here. Using synthesis for now.
    function playClick(time, isQuarter) {
        if (clickMuted) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.frequency.value = isQuarter ? 880 : 440;
        gain.gain.value = clickVolume;
        
        osc.start(time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
        osc.stop(time + 0.1);
    }

    class Track {
        constructor(id) {
            this.id = id;
            this.state = 'empty'; // empty, waiting_record, recording, playing, muted
            this.bars = 1;
            this.chop = 'OFF';
            this.volume = 0.8;
            this.nudgeMs = -200; // default hardware latency compensation
            
            this.audioBuffer = null;
            this.sourceNode = null;
            this.gainNode = null;
            
            this.mediaRecorder = null;
            this.recordedChunks = [];
            
            this.buildUI();
        }

        buildUI() {
            const container = document.getElementById('tracks');
            const trackDiv = document.createElement('div');
            trackDiv.className = 'track';
            
            trackDiv.innerHTML = `
                <div class="track-controls">
                    <div class="track-btn" id="clear-${this.id}">CLEAR</div>
                    <div class="track-btn" id="vol-${this.id}">VOL</div>
                    <div class="track-btn" id="chop-${this.id}">CHOP: OFF</div>
                    <div class="track-btn" id="bars-${this.id}">BARS: 1</div>
                    <div class="track-btn" id="nudge-${this.id}">NUDGE</div>
                </div>
                <div id="slider-vol-${this.id}" class="slider-container">
                    <label>Vol:</label>
                    <input type="range" min="0" max="300" value="80">
                    <span>80%</span>
                </div>
                <div id="slider-nudge-${this.id}" class="slider-container">
                    <label>Nudge:</label>
                    <input type="range" min="-350" max="350" value="-200">
                    <span>-200ms</span>
                </div>
                <div class="node-grid" id="grid-${this.id}">
                    ${Array(16).fill(0).map((_,i) => `<div class="node ${i%4===0 ? 'beat' : ''}" id="node-${this.id}-${i}"></div>`).join('')}
                </div>
                <div class="stomp-area">
                    <div class="stomp-pedal" id="stomp-${this.id}"></div>
                    <div class="led stomp-led" id="led-${this.id}"></div>
                </div>
            `;
            container.appendChild(trackDiv);
            
            // UI Bindings
            document.getElementById(`stomp-${this.id}`).addEventListener('pointerdown', () => this.handleStomp());
            document.getElementById(`clear-${this.id}`).addEventListener('pointerdown', () => this.clearTrack());
            
            // Toggles
            const barsBtn = document.getElementById(`bars-${this.id}`);
            barsBtn.addEventListener('pointerdown', () => {
                if(this.state !== 'empty') return; // Can't change bars if recorded
                this.bars = this.bars === 1 ? 2 : (this.bars === 2 ? 4 : 1);
                barsBtn.innerText = `BARS: ${this.bars}`;
                this.updateGridUI();
            });

            // Sliders Toggle visibility
            const bindSliderToggle = (btnId, sliderId) => {
                document.getElementById(btnId).addEventListener('pointerdown', () => {
                    document.getElementById(sliderId).classList.toggle('active');
                });
            };
            bindSliderToggle(`vol-${this.id}`, `slider-vol-${this.id}`);
            bindSliderToggle(`nudge-${this.id}`, `slider-nudge-${this.id}`);
        }

        updateGridUI() {
            const grid = document.getElementById(`grid-${this.id}`);
            grid.innerHTML = Array(16 * this.bars).fill(0).map((_,i) => 
                `<div class="node ${i%4===0 ? 'beat' : ''}" id="node-${this.id}-${i}"></div>`
            ).join('');
            grid.style.gridTemplateColumns = `repeat(16, 1fr)`;
        }

        updateVisualNode(stepIndex) {
            const totalNodes = 16 * this.bars;
            const localStep = stepIndex % totalNodes;
            
            // Clear previous
            const prevStep = localStep === 0 ? totalNodes - 1 : localStep - 1;
            const prevEl = document.getElementById(`node-${this.id}-${prevStep}`);
            if(prevEl) prevEl.classList.remove('active');
            
            // Set active
            const el = document.getElementById(`node-${this.id}-${localStep}`);
            if(el) el.classList.add('active');
        }

        setLED(colorClass) {
            const led = document.getElementById(`led-${this.id}`);
            led.className = `led stomp-led ${colorClass}`;
        }

        handleStomp() {
            if (!isPlaying) return;
            
            if (this.state === 'empty') {
                this.state = 'waiting_record';
                this.setLED('dim-red');
            } else if (this.state === 'playing') {
                this.state = 'muted';
                if(this.gainNode) this.gainNode.gain.value = 0;
                this.setLED('dim-red');
            } else if (this.state === 'muted') {
                this.state = 'playing';
                if(this.gainNode) this.gainNode.gain.value = this.volume;
                this.setLED('green');
            }
        }

        clearTrack() {
            if(this.sourceNode) this.sourceNode.stop();
            this.audioBuffer = null;
            this.state = 'empty';
            this.setLED('');
        }

        startRecording() {
            this.state = 'recording';
            this.setLED('bright-red');
            this.recordedChunks = [];
            
            // Zero-bleed: mute all other tracks
            tracks.forEach(t => {
                if(t.id !== this.id && t.gainNode) t.gainNode.gain.value = 0;
            });

            this.mediaRecorder = new MediaRecorder(micStream);
            this.mediaRecorder.ondataavailable = e => this.recordedChunks.push(e.data);
            this.mediaRecorder.onstop = () => this.processRecording();
            this.mediaRecorder.start();
        }

        stopRecording() {
            if(this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                this.mediaRecorder.stop();
            }
            this.state = 'playing';
            this.setLED('green');
            
            // Restore volumes for all tracks
            tracks.forEach(t => {
                if(t.gainNode && t.state === 'playing') t.gainNode.gain.value = t.volume;
            });
        }

        async processRecording() {
            const blob = new Blob(this.recordedChunks, { type: 'audio/webm' });
            const arrayBuffer = await blob.arrayBuffer();
            this.audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            this.normalizeBuffer(this.audioBuffer);
            this.applyMicroscopicFade(this.audioBuffer);
            
            // Re-routing for playback
            if(!this.gainNode) {
                this.gainNode = audioCtx.createGain();
                this.gainNode.connect(audioCtx.destination);
            }
            this.gainNode.gain.value = this.volume;
        }

        normalizeBuffer(buffer) {
            for (let c = 0; c < buffer.numberOfChannels; c++) {
                let data = buffer.getChannelData(c);
                let max = 0;
                for (let i = 0; i < data.length; i++) {
                    if (Math.abs(data[i]) > max) max = Math.abs(data[i]);
                }
                if (max > 0) {
                    let multiplier = 1 / max;
                    for (let i = 0; i < data.length; i++) data[i] *= multiplier;
                }
            }
        }

        applyMicroscopicFade(buffer) {
            // Fades out the last 20ms to prevent clicks
            const fadeTimeSec = 0.02; 
            const sampleRate = buffer.sampleRate;
            const fadeSamples = Math.floor(fadeTimeSec * sampleRate);
            
            for (let c = 0; c < buffer.numberOfChannels; c++) {
                let data = buffer.getChannelData(c);
                for (let i = 0; i < fadeSamples; i++) {
                    let index = data.length - fadeSamples + i;
                    if(index >= 0) {
                        data[index] *= (1 - (i / fadeSamples));
                    }
                }
            }
        }

        playLoop(time) {
            if(!this.audioBuffer || this.state !== 'playing') return;
            
            this.sourceNode = audioCtx.createBufferSource();
            this.sourceNode.buffer = this.audioBuffer;
            this.sourceNode.connect(this.gainNode);
            
            // Apply Latency pull-back
            let playTime = time + (this.nudgeMs / 1000);
            if(playTime < audioCtx.currentTime) playTime = audioCtx.currentTime; // Safety
            
            this.sourceNode.start(playTime);
        }
    }

    const tracks = [];
    for(let i=1; i<=TRACK_COUNT; i++) {
        tracks.push(new Track(i));
    }

    // Scheduling Logic
    function nextNote() {
        const secondsPerBeat = 60.0 / globalTempo;
        nextNoteTime += 0.25 * secondsPerBeat; // 16th note timing
        current16thNote++;
        if (current16thNote === 16) {
            current16thNote = 0;
        }
    }

    function scheduleNote(beatNumber, time) {
        // Global visual flash on quarters
        if (beatNumber % 4 === 0) {
            const led = document.getElementById('global-led');
            led.classList.add('flash');
            setTimeout(() => led.classList.remove('flash'), 50);
            
            playClick(time, beatNumber === 0); // High click on the 1
            
            // Handle Downbeat Recording Logic
            if(beatNumber === 0) {
                tracks.forEach(track => {
                    if(track.state === 'waiting_record') {
                        track.startRecording();
                    } else if (track.state === 'recording') {
                        // Assuming 1 bar loop for basic state, scalable later via track.bars
                        track.stopRecording();
                        track.playLoop(time);
                    } else if (track.state === 'playing') {
                        track.playLoop(time);
                    }
                });
            }
        }

        // Update traveling nodes
        tracks.forEach(track => track.updateVisualNode(current16thNote));
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
            scheduleNote(current16thNote, nextNoteTime);
            nextNote();
        }
        timerID = window.setTimeout(scheduler, lookahead);
    }

    // Global UI bindings
    document.getElementById('btn-start').addEventListener('pointerdown', async function() {
        if (!isPlaying) {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            // Init Mic with constraints to avoid thin sound/processing
            if (!micStream && !isBTReady) {
                try {
                    micStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        }
                    });
                } catch(e) {
                    alert("Mic access required to loop.");
                    return;
                }
            }

            isPlaying = true;
            this.innerText = "STOP";
            this.classList.add('active');
            
            current16thNote = 0;
            nextNoteTime = audioCtx.currentTime + 0.05;
            scheduler();
        } else {
            isPlaying = false;
            this.innerText = "START";
            this.classList.remove('active');
            window.clearTimeout(timerID);
            
            // Instant kill audio
            tracks.forEach(t => {
                if(t.sourceNode) {
                    try { t.sourceNode.stop(); } catch(e){}
                }
            });
        }
    });

    document.getElementById('btn-tempo').addEventListener('pointerdown', () => {
        document.getElementById('slider-tempo').classList.toggle('active');
    });
    
    document.getElementById('tempo-range').addEventListener('input', (e) => {
        globalTempo = e.target.value;
        document.getElementById('tempo-val').innerText = globalTempo;
    });

    document.getElementById('btn-click').addEventListener('pointerdown', () => {
        document.getElementById('slider-click').classList.toggle('active');
    });

    document.getElementById('click-vol-range').addEventListener('input', (e) => {
        clickVolume = e.target.value / 100;
        document.getElementById('click-vol-val').innerText = `${e.target.value}%`;
    });

    document.getElementById('btn-mute').addEventListener('pointerdown', function() {
        clickMuted = !clickMuted;
        this.style.background = clickMuted ? "#ff3333" : "#222";
    });

    document.getElementById('btn-bt').addEventListener('pointerdown', function() {
        isBTReady = !isBTReady;
        if(isBTReady) {
            this.classList.add('active');
            // Release Mic so iOS can switch audio routes to Bluetooth
            if(micStream) {
                micStream.getTracks().forEach(track => track.stop());
                micStream = null;
            }
        } else {
            this.classList.remove('active');
            // Note: Would need to re-request getUserMedia here if switching back dynamically
        }
    });
</script>
</body>
</html>
