<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Looper v0.01</title>
    <style>
        :root {
            --pedal-white: #fcfcfc;
            --metal-silver: conic-gradient(from 180deg, #e0e0e0, #999, #e0e0e0, #999, #e0e0e0);
            --node-dim: #d1d9e0;
            --node-active: #ffffff;
            --rec-red: #ff3333;
            --wait-red: #660000;
            --play-green: #33ff33;
        }

        body {
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; font-family: -apple-system, sans-serif;
            touch-action: manipulation; overflow: hidden;
        }

        .pedal-body {
            width: 320px; height: 560px;
            background: var(--pedal-white);
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid #ddd;
        }

        .header { text-align: center; margin-top: 20px; color: #333; }
        .header h1 { font-size: 16px; margin: 0; letter-spacing: 2px; }
        .header p { font-size: 9px; margin: 3px 0; opacity: 0.7; }

        /* Control Rows */
        .controls-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; width: 90%; margin-top: 15px;
        }
        .mini-btn {
            background: #e0e0e0; border: 1px solid #bbb; padding: 8px 0;
            border-radius: 6px; font-size: 9px; font-weight: bold;
            box-shadow: 0 2px 0 #999; active: transform: translateY(1px);
        }

        /* Sliders Overlay */
        .slider-pop {
            position: absolute; top: 110px; width: 80%;
            background: rgba(255,255,255,0.95); padding: 10px;
            border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none; z-index: 10; flex-direction: column; align-items: center;
        }
        input[type=range] { width: 100%; }

        /* Sequencer Display */
        .display-area {
            width: 90%; background: #222; border-radius: 10px;
            padding: 10px 5px; margin-top: 15px;
            box-shadow: inset 0 2px 10px black;
            min-height: 40px;
        }
        .node-row { display: flex; justify-content: space-around; margin-bottom: 4px; }
        .node { width: 12px; height: 12px; border-radius: 2px; background: var(--node-dim); }
        .node.beat { background: #445566; } 
        .node.the-one { background: #aa4444; } 
        .node.active { background: var(--node-active); box-shadow: 0 0 10px white; }

        /* Stomp Section */
        .status-led {
            width: 18px; height: 18px; border-radius: 50%;
            background: #333; margin: 20px 0 10px 0;
        }
        .led-rec { background: var(--rec-red); box-shadow: 0 0 15px var(--rec-red); }
        .led-wait { background: var(--wait-red); }
        .led-play { background: var(--play-green); box-shadow: 0 0 15px var(--play-green); }

        .stomp-btn {
            width: 100px; height: 100px;
            background: var(--metal-silver);
            border-radius: 50%; border: 4px solid #888;
            box-shadow: 0 8px 0 #555, 0 15px 25px rgba(0,0,0,0.4);
        }
        .stomp-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #555; }
    </style>
</head>
<body>

<div class="pedal-body">
    <div class="header">
        <h1>J-LOOPER v0.01</h1>
        <p>CREATED BY JEREMIAH KELLER</p>
    </div>

    <div class="controls-grid">
        <button class="mini-btn" onclick="showSlider('tempo')">TEMPO</button>
        <button class="mini-btn" onclick="cycleBars()">BARS: <span id="bar-label">1</span></button>
        <button class="mini-btn" onclick="clearLoops()">CLEAR</button>
        <button class="mini-btn" onclick="saveToPhone()">SAVE</button>
    </div>
    <div class="controls-grid">
        <button class="mini-btn" onclick="showSlider('vol')">VOL</button>
        <button class="mini-btn" onclick="showSlider('click')">CLICK</button>
        <button class="mini-btn" onclick="stopEverything()">STOP</button>
        <button class="mini-btn" onclick="undoLast()">UNDO</button>
    </div>

    <div id="slider-overlay" class="slider-pop">
        <span id="slider-title" style="font-size:10px; font-weight:bold;">TEMPO</span>
        <input type="range" id="main-slider" oninput="handleSlider(this.value)">
        <button onclick="this.parentElement.style.display='none'" style="margin-top:5px; font-size:10px;">DONE</button>
    </div>

    <div class="display-area" id="node-container"></div>

    <div class="status-led" id="status-led"></div>

    <div class="stomp-btn" id="stomp-btn" onclick="handleStomp()"></div>
</div>

<script>
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let tempo = 120, bars = 1, currentStep = 0, isRunning = false;
    let state = "IDLE"; // IDLE, WAITING, RECORDING, PLAYING
    let activeSlider = '';

    // Ported dummy click sound for timing
    function playClick() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(currentStep % 16 === 0 ? 880 : 440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function renderNodes() {
        const container = document.getElementById('node-container');
        container.innerHTML = '';
        for (let b = 0; b < bars; b++) {
            const row = document.createElement('div'); row.className = 'node-row';
            for (let s = 0; s < 16; s++) {
                const node = document.createElement('div'); node.className = 'node';
                if (b === 0 && s === 0) node.classList.add('the-one');
                else if (s % 4 === 0) node.classList.add('beat');
                node.id = `node-${b}-${s}`;
                row.appendChild(node);
            }
            container.appendChild(row);
        }
    }

    function showSlider(type) {
        activeSlider = type;
        const div = document.getElementById('slider-overlay');
        const slider = document.getElementById('main-slider');
        const title = document.getElementById('slider-title');
        div.style.display = 'flex';
        title.innerText = type.toUpperCase();
        if(type==='tempo') { slider.min=40; slider.max=220; slider.value=tempo; }
        else { slider.min=0; slider.max=100; slider.value=50; }
    }

    function handleSlider(val) {
        if(activeSlider === 'tempo') tempo = val;
        // Add vol/click gain logic here
    }

    function cycleBars() {
        bars = bars === 4 ? 1 : bars * 2;
        document.getElementById('bar-label').innerText = bars;
        renderNodes();
    }

    function handleStomp() {
        if (!isRunning) {
            audioCtx.resume();
            isRunning = true;
            tick();
            return;
        }
        if (state === "IDLE" || state === "PLAYING") {
            state = "WAITING";
            document.getElementById('status-led').className = 'status-led led-wait';
        }
    }

    function tick() {
        if(!isRunning) return;
        const stepTime = (60 / tempo) / 4;
        
        document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
        const b = Math.floor(currentStep / 16);
        const s = currentStep % 16;
        document.getElementById(`node-${b}-${s}`)?.classList.add('active');

        playClick();

        if (currentStep === 0) {
            if (state === "WAITING") {
                state = "RECORDING";
                document.getElementById('status-led').className = 'status-led led-rec';
            } else if (state === "RECORDING") {
                state = "PLAYING";
                document.getElementById('status-led').className = 'status-led led-play';
            }
        }

        currentStep = (currentStep + 1) % (bars * 16);
        setTimeout(tick, stepTime * 1000);
    }

    function stopEverything() {
        isRunning = false;
        currentStep = 0;
        state = "IDLE";
        document.getElementById('status-led').className = 'status-led';
        document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
    }

    function clearLoops() {
        stopEverything();
        // Logic to clear audio buffers
        alert("Loops Erased");
    }

    renderNodes();
</script>
</body>
</html>
