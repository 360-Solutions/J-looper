<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Looper v0.02</title>
    <style>
        :root {
            --pedal-white: #fcfcfc;
            --metal-silver: conic-gradient(from 180deg, #e0e0e0, #999, #e0e0e0, #999, #e0e0e0);
            --node-dim: #d1d9e0;
            --node-active: #ffffff;
            --rec-bright: #ff0000;
            --rec-dim: #660000;
            --play-green: #33ff33;
        }

        body {
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; font-family: -apple-system, sans-serif;
            touch-action: manipulation; overflow: hidden;
        }

        .pedal-body {
            width: 320px; height: 580px;
            background: var(--pedal-white);
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            position: relative; display: flex; flex-direction: column; align-items: center;
            border: 1px solid #ddd;
        }

        .header { text-align: center; margin-top: 20px; color: #333; }
        .header h1 { font-size: 16px; margin: 0; letter-spacing: 2px; font-weight: 900; }
        .header p { font-size: 9px; margin: 3px 0; opacity: 0.7; }

        .controls-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; width: 92%; margin-top: 12px;
        }
        .mini-btn {
            background: #e0e0e0; border: 1px solid #bbb; padding: 10px 0;
            border-radius: 6px; font-size: 9px; font-weight: bold;
            box-shadow: 0 3px 0 #999;
        }
        .mini-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #999; }

        /* Slider Overlay */
        .slider-pop {
            position: absolute; top: 120px; width: 85%;
            background: rgba(255,255,255,0.98); padding: 15px;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none; z-index: 100; flex-direction: column; align-items: center;
            border: 1px solid #ccc;
        }
        .slider-readout { font-size: 24px; font-weight: bold; color: #2c3e50; margin: 10px 0; }

        .display-area {
            width: 90%; background: #111; border-radius: 10px;
            padding: 12px 5px; margin-top: 15px;
            box-shadow: inset 0 2px 10px black; min-height: 40px;
        }
        .node-row { display: flex; justify-content: space-around; margin-bottom: 5px; }
        .node { width: 12px; height: 12px; border-radius: 2px; background: #333; transition: 0.05s; }
        .node.beat { background: #444; } 
        .node.the-one { background: #600; } 
        .node.active { background: var(--node-active); box-shadow: 0 0 12px white; }

        .status-led {
            width: 22px; height: 22px; border-radius: 50%;
            background: #222; margin: 25px 0 10px 0;
            transition: background 0.2s; border: 2px solid #555;
        }
        .led-wait { background: var(--rec-dim); box-shadow: 0 0 5px var(--rec-dim); }
        .led-rec { background: var(--rec-bright); box-shadow: 0 0 20px var(--rec-bright); }
        .led-play { background: var(--play-green); box-shadow: 0 0 15px var(--play-green); }

        .stomp-btn {
            width: 110px; height: 110px;
            background: var(--metal-silver);
            border-radius: 50%; border: 5px solid #888;
            box-shadow: 0 10px 0 #555, 0 15px 25px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        .stomp-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #555; }
    </style>
</head>
<body>

<div class="pedal-body">
    <div class="header">
        <h1>J-LOOPER v0.02</h1>
        <p>CREATED BY JEREMIAH KELLER</p>
    </div>

    <div class="controls-grid">
        <button class="mini-btn" onclick="openSlider('tempo')">TEMPO</button>
        <button class="mini-btn" onclick="cycleBars()">BARS: <span id="bar-label">1</span></button>
        <button class="mini-btn" onclick="location.reload()">CLEAR</button>
        <button class="mini-btn" onclick="alert('Saving...')">SAVE</button>
    </div>
    <div class="controls-grid">
        <button class="mini-btn" onclick="openSlider('vol')">VOL</button>
        <button class="mini-btn" onclick="openSlider('click')">CLICK</button>
        <button class="mini-btn" onclick="stopEngine()">STOP</button>
        <button class="mini-btn" onclick="undo()">UNDO</button>
    </div>

    <div id="slider-overlay" class="slider-pop">
        <span id="slider-title" style="font-size:12px; letter-spacing:1px;">TEMPO</span>
        <div class="slider-readout" id="slider-val">120</div>
        <input type="range" id="main-slider" oninput="updateSlider(this.value)">
        <button class="mini-btn" style="width:80px; margin-top:15px;" onclick="closeSlider()">DONE</button>
    </div>

    <div class="display-area" id="node-container"></div>
    <div class="status-led" id="status-led"></div>
    <div class="stomp-btn" onclick="handleStomp()"></div>
</div>

<script>
    let audioCtx, masterGain, clickGain;
    let tempo = 120, bars = 1, currentStep = 0, isRunning = false;
    let state = "IDLE"; 
    let pendingRecord = false;
    let cycleCount = 0;
    let activeSliderMode = '';

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        clickGain = audioCtx.createGain();
        clickGain.connect(masterGain);
        masterGain.connect(audioCtx.destination);
    }

    function renderNodes() {
        const container = document.getElementById('node-container');
        container.innerHTML = '';
        for (let b = 0; b < bars; b++) {
            const row = document.createElement('div'); row.className = 'node-row';
            for (let s = 0; s < 16; s++) {
                const node = document.createElement('div'); node.className = 'node';
                if (b === 0 && s === 0) node.classList.add('the-one');
                else if (s % 4 === 0) node.classList.add('beat');
                node.id = `node-${b}-${s}`;
                row.appendChild(node);
            }
            container.appendChild(row);
        }
    }

    function openSlider(mode) {
        activeSliderMode = mode;
        const overlay = document.getElementById('slider-overlay');
        const slider = document.getElementById('main-slider');
        overlay.style.display = 'flex';
        document.getElementById('slider-title').innerText = mode.toUpperCase();
        
        if (mode === 'tempo') {
            slider.min = 40; slider.max = 220; slider.value = tempo;
            document.getElementById('slider-val').innerText = tempo;
        } else {
            slider.min = 0; slider.max = 100; slider.value = 70;
            document.getElementById('slider-val').innerText = slider.value + "%";
        }
    }

    function updateSlider(val) {
        document.getElementById('slider-val').innerText = (activeSliderMode === 'tempo') ? val : val + "%";
        if (activeSliderMode === 'tempo') tempo = val;
        if (activeSliderMode === 'click') clickGain.gain.value = val / 100;
        if (activeSliderMode === 'vol') masterGain.gain.value = val / 100;
    }

    function closeSlider() { document.getElementById('slider-overlay').style.display = 'none'; }

    function handleStomp() {
        initAudio();
        audioCtx.resume();
        if (!isRunning) {
            isRunning = true;
            state = "IDLE";
            tick();
        } else {
            if (state === "IDLE" || state === "PLAYING") {
                pendingRecord = true;
                document.getElementById('status-led').className = 'status-led led-wait';
                cycleCount = 0; // Reset cycle count to ensure a full lap
            }
        }
    }

    function tick() {
        if (!isRunning) return;
        const stepTime = (60 / tempo) / 4;
        
        // Visual Progress
        document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
        const b = Math.floor(currentStep / 16);
        const s = currentStep % 16;
        document.getElementById(`node-${b}-${s}`)?.classList.add('active');

        // Play Click (only if not recording)
        if (state !== "RECORDING") {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(s % 4 === 0 ? 1000 : 500, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(g); g.connect(clickGain);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        // Handle Logic on "The One"
        if (currentStep === 0) {
            if (pendingRecord) {
                cycleCount++;
                // If we've completed the partial cycle AND one full cycle
                if (cycleCount >= 2) {
                    state = "RECORDING";
                    pendingRecord = false;
                    document.getElementById('status-led').className = 'status-led led-rec';
                    // MUTE ALL
                    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
                }
            } else if (state === "RECORDING") {
                state = "PLAYING";
                document.getElementById('status-led').className = 'status-led led-play';
                // UNMUTE ALL
                masterGain.gain.setValueAtTime(1, audioCtx.currentTime);
            }
        }

        currentStep = (currentStep + 1) % (bars * 16);
        setTimeout(tick, stepTime * 1000);
    }

    function stopEngine() {
        isRunning = false;
        currentStep = 0;
        state = "IDLE";
        pendingRecord = false;
        document.getElementById('status-led').className = 'status-led';
        document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
    }

    function cycleBars() {
        bars = [1, 2, 4][([1, 2, 4].indexOf(bars) + 1) % 3];
        document.getElementById('bar-label').innerText = bars;
        renderNodes();
    }

    renderNodes();
</script>
</body>
</html>
