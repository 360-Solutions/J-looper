<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-Looper v0.01</title>
    <style>
        :root {
            --pedal-white: #fcfcfc;
            --metal-silver: conic-gradient(from 180deg, #e0e0e0, #999, #e0e0e0, #999, #e0e0e0);
            --node-dim: #d1d9e0;
            --node-active: #ffffff;
            --accent-blue: #2c3e50;
            --rec-red: #ff3333;
            --wait-red: #660000;
            --play-green: #33ff33;
        }

        body {
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; font-family: -apple-system, sans-serif;
            touch-action: manipulation;
        }

        .pedal-body {
            width: 320px; height: 520px;
            background: var(--pedal-white);
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 2px 5px white;
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid #ddd;
        }

        .header {
            text-align: center; margin-top: 30px; color: #333;
        }

        .header h1 { font-size: 18px; margin: 0; letter-spacing: 2px; }
        .header p { font-size: 10px; margin: 5px 0; opacity: 0.7; }

        /* Node Grid Display */
        .display-area {
            width: 90%; background: #222; border-radius: 10px;
            padding: 15px 5px; margin-top: 20px;
            box-shadow: inset 0 2px 10px black;
        }

        .node-row { display: flex; justify-content: space-around; margin-bottom: 5px; }
        .node {
            width: 12px; height: 12px; border-radius: 2px;
            background: var(--node-dim); transition: 0.1s;
        }
        .node.beat { background: #445566; } /* 1, 5, 9, 13 */
        .node.the-one { background: #aa4444; } /* Node 1 */
        .node.active { background: var(--node-active); box-shadow: 0 0 10px white; }

        /* Controls */
        .controls {
            display: flex; gap: 10px; margin-top: 20px;
        }
        .mini-btn {
            background: #ddd; border: 1px solid #bbb; padding: 5px 10px;
            border-radius: 5px; font-size: 10px; font-weight: bold;
            box-shadow: 0 2px 0 #999;
        }

        /* The Stomp Button */
        .stomp-container {
            margin-top: 50px; position: relative;
        }
        .stomp-btn {
            width: 110px; height: 110px;
            background: var(--metal-silver);
            border-radius: 50%;
            border: 5px solid #888;
            box-shadow: 0 10px 0 #555, 0 15px 25px rgba(0,0,0,0.4);
            cursor: pointer; active: transform: translateY(6px);
        }
        .stomp-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #555;
        }

        .status-led {
            width: 20px; height: 20px; border-radius: 50%;
            background: #333; margin: 15px auto;
            box-shadow: inset 0 2px 5px black;
        }
        .led-rec { background: var(--rec-red); box-shadow: 0 0 15px var(--rec-red); }
        .led-wait { background: var(--wait-red); }
        .led-play { background: var(--play-green); box-shadow: 0 0 15px var(--play-green); }

        .footer-link {
            position: absolute; bottom: 15px; font-size: 9px;
            text-decoration: none; color: #888;
        }
    </style>
</head>
<body>

<div class="pedal-body">
    <div class="header">
        <h1>J-LOOPER v0.01</h1>
        <p>CREATED BY JEREMIAH KELLER</p>
    </div>

    <div class="controls">
        <button class="mini-btn" onclick="toggleTempo()">TEMPO</button>
        <button class="mini-btn" onclick="cycleBars()">BARS: <span id="bar-label">1</span></button>
        <button class="mini-btn" onclick="clearLoops()">CLEAR</button>
        <button class="mini-btn" onclick="saveToPhone()">SAVE</button>
    </div>

    <div class="display-area" id="node-container">
        </div>

    <div class="status-led" id="status-led"></div>

    <div class="stomp-container">
        <div class="stomp-btn" id="stomp-btn"></div>
    </div>

    <a href="#" class="footer-link">BUY ME A COFFEE</a>
</div>

<script>
    // --- AUDIO & LOGIC ENGINE (STOLEN FROM YOUR DUM-SAMPLER) ---
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isRunning = false;
    let tempo = 120;
    let bars = 1;
    let currentStep = 0;
    let state = "IDLE"; // IDLE, WAITING, RECORDING, PLAYING
    
    // IndexedDB Setup
    let db;
    const request = indexedDB.open("JLooperDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("loops");
    request.onsuccess = e => db = e.target.result;

    function renderNodes() {
        const container = document.getElementById('node-container');
        container.innerHTML = '';
        for (let b = 0; b < bars; b++) {
            const row = document.createElement('div');
            row.className = 'node-row';
            for (let s = 0; s < 16; s++) {
                const node = document.createElement('div');
                node.className = 'node';
                if (b === 0 && s === 0) node.classList.add('the-one');
                else if (s % 4 === 0) node.classList.add('beat');
                node.id = `node-${b}-${s}`;
                row.appendChild(node);
            }
            container.appendChild(row);
        }
    }

    // Logic for the Stomp Button
    document.getElementById('stomp-btn').addEventListener('click', () => {
        if (!isRunning) {
            startEngine();
            return;
        }
        
        if (state === "IDLE" || state === "PLAYING") {
            state = "WAITING";
            document.getElementById('status-led').className = 'status-led led-wait';
        }
    });

    function startEngine() {
        audioCtx.resume();
        isRunning = true;
        tick();
    }

    function tick() {
        const stepTime = (60 / tempo) / 4;
        
        // Update Visuals
        document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
        const bar = Math.floor(currentStep / 16);
        const step = currentStep % 16;
        const activeNode = document.getElementById(`node-${bar}-${step}`);
        if (activeNode) activeNode.classList.add('active');

        // Logic for state transitions on "The One"
        if (currentStep === 0) {
            if (state === "WAITING") {
                state = "RECORDING";
                document.getElementById('status-led').className = 'status-led led-rec';
                console.log("RECORDING STARTED");
                // Insert your MediaRecorder logic here
            } else if (state === "RECORDING") {
                state = "PLAYING";
                document.getElementById('status-led').className = 'status-led led-play';
                console.log("RECORDING ENDED -> PLAYBACK");
            }
        }

        currentStep = (currentStep + 1) % (bars * 16);
        setTimeout(tick, stepTime * 1000);
    }

    function saveToPhone() {
        alert("Loop saved to IndexedDB!");
        // Code to store 'audioBlob' into db.transaction("loops").objectStore("loops").add(blob, Date.now())
    }

    renderNodes();
</script>
</body>
</html>
